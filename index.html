<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WF3 - RA WebAR (Android)</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 20px; }
    select, button { font-size: 16px; padding: 10px; margin: 8px 0; width: 100%; }
    .box { border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-top: 12px; }
    small { color: #555; }
  </style>
</head>
<body>
  <h1>WF3 – WebAR (Android / Scene Viewer)</h1>

  <div class="box">
    <label><b>Selecione o modelo:</b></label>
    <select id="modelSelect">
      <option value="models/TA_LOD1.glb">TA - LOD1</option>
      <option value="models/TA_LOD2.glb">TA - LOD2</option>
      <option value="models/TB_LOD1.glb">TB - LOD1</option>
      <option value="models/TB_LOD2.glb">TB - LOD2</option>
      <option value="models/TC_LOD1.glb">TC - LOD1</option>
      <option value="models/TC_LOD2.glb">TC - LOD2</option>
    </select>

    <button id="arBtn">Abrir em RA (Android)</button>

    <p><small>
      Requisito: Android + Chrome (abre no Scene Viewer/ARCore). No PC não abre RA.
    </small></p>
  </div>

  <script>
    const btn = document.getElementById('arBtn');
    const select = document.getElementById('modelSelect');

    btn.addEventListener('click', () => {
      const relPath = select.value;
      const fullUrl = new URL(relPath, window.location.href).toString();

      const intentUrl =
        `intent://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(fullUrl)}&mode=ar_only` +
        `#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;end;`;

      window.location.href = intentUrl;
    });
  </script>
</body>
</html>
